<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripReport — Home Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="android-frame.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F0EEE9; }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.9)} }
    @keyframes ripple { 0%{opacity:.4;transform:scale(1)} 100%{opacity:0;transform:scale(2.8)} }
    @keyframes trackin { from{stroke-dashoffset:800} to{stroke-dashoffset:0} }
    @keyframes trackFill { from{width:0%} to{width:100%} }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ── Design Tokens ──────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#2C5F3E",
  "accentLight": "#EBF3ED",
  "accentMid": "#4A8B61",
  "amber": "#B8702E",
  "amberLight": "#FBF0E4",
  "track": "#5DBE7E",
  "bg": "#F5F4F0",
  "card": "#FFFFFF",
  "text": "#1A1917",
  "textSub": "#6B6763",
  "textFaint": "#A09D99",
  "border": "#E8E5E0",
  "tripName": "Lost Coast Trail"
}/*EDITMODE-END*/;

const F = "'Plus Jakarta Sans', system-ui, sans-serif";

// ── Icon ──────────────────────────────────────────────────────
const Ic = ({ d, d2, size=20, color, sw=1.8, fill="none" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color}
    strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
    <path d={d} />
    {d2 && <path d={d2} />}
  </svg>
);

const ICONS = {
  home:     "M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z",
  home2:    "M9 22V12h6v10",
  map:      "M1 6l7-3 8 3 7-3v16l-7 3-8-3-7 3V6z",
  map2:     "M8 3v16 M16 6v16",
  plus:     "M12 5v14M5 12h14",
  journal:  "M4 19.5A2.5 2.5 0 016.5 17H20",
  journal2: "M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z",
  share:    "M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8",
  share2:   "M16 6l-4-4-4 4 M12 2v13",
  camera:   "M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z M12 8a4 4 0 100 8 4 4 0 000-8z",
  mic:      "M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z M19 10v2a7 7 0 01-14 0v-2 M12 19v4 M8 23h8",
  video:    "M23 7l-7 5 7 5V7z M1 5h14a2 2 0 012 2v10a2 2 0 01-2 2H1",
  tent:     "M3 17l9-14 9 14H3z M12 3v14",
  leaf:     "M17 8C8 10 5.9 16.17 3.82 19h3.45C9 17 12 14 17 8z M21 3L3 21",
  drop:     "M12 2.69l5.66 5.66a8 8 0 11-11.31 0z",
  fork:     "M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2 M7 2v20 M21 15V2a5 5 0 00-5 5v6c0 1.1.9 2 2 2h3z M21 15v7",
  compass:  "M12 22c5.52 0 10-4.48 10-10S17.52 2 12 2 2 6.48 2 12s4.48 10 10 10z M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z",
  users:    "M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2 M23 21v-2a4 4 0 00-3-3.87 M16 3.13a4 4 0 010 7.75 M9 7a4 4 0 100 8 4 4 0 000-8z",
  chevR:    "M9 18l6-6-6-6",
  note:     "M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7 M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z",
};

// ── Topo Map SVG ─────────────────────────────────────────────
const MapSVG = ({ w, h, compact=false, trackAnim=false }) => {
  const vH = compact ? 165 : 220;
  return (
    <svg width={w} height={h} viewBox={`0 0 430 ${vH}`} preserveAspectRatio="xMidYMid slice"
         style={{display:'block', width:'100%', height:'100%'}}>
      {/* Base */}
      <rect width="430" height={vH} fill="#EEF2E4"/>
      {/* Forest patches */}
      <ellipse cx="75" cy="95" rx="62" ry="48" fill="#D0E4B4" opacity=".65"/>
      <ellipse cx="330" cy="72" rx="58" ry="42" fill="#D0E4B4" opacity=".55"/>
      <ellipse cx="195" cy="148" rx="48" ry="32" fill="#D0E4B4" opacity=".45"/>
      {/* Road/path grid subtle */}
      <line x1="0" y1="120" x2="430" y2="120" stroke="#D4D8C0" strokeWidth=".5" opacity=".5"/>
      {/* Stream */}
      <path d="M295 165 Q310 140 318 114 Q326 88 330 62" fill="none" stroke="#A8C8E0" strokeWidth="3.5" opacity=".75"/>
      <path d="M295 165 Q310 140 318 114 Q326 88 330 62" fill="none" stroke="#C8E0F0" strokeWidth="1.5" opacity=".5"/>
      {/* Topo contours */}
      {[
        ["M5,78 Q60,58 112,72 Q168,86 215,65 Q260,44 308,60 Q355,76 425,57", .9],
        ["M0,93 Q55,73 108,88 Q162,102 208,80 Q253,58 300,75 Q348,92 425,72", .75],
        ["M8,108 Q62,88 115,103 Q168,118 214,96 Q258,74 305,91 Q352,108 425,88", .75],
        ["M15,58 Q68,38 120,53 Q172,68 218,47 Q263,26 308,42 Q355,58 415,42", .85],
        ["M25,42 Q78,24 132,38 Q182,52 228,32 Q272,12 316,28 Q360,45 408,30", .7],
        ["M0,124 Q55,108 108,122 Q160,136 206,116 Q250,96 298,112 Q344,128 425,110", .7],
        ["M4,140 Q58,124 110,138 Q162,152 208,132 Q252,112 300,128 Q348,144 422,126", .65],
        ["M10,156 Q62,140 114,155 Q164,169 210,148 Q254,128 300,144 Q348,160 418,142", .55],
      ].map(([d,op],i) => (
        <path key={i} d={d} fill="none" stroke="#B0C48C"
              strokeWidth={i%3===0?1.4:.7} opacity={op}/>
      ))}
      {/* Elevation label on ridge */}
      <text x="270" y="38" fontSize="9" fill="#7A8B5C" fontFamily="system-ui" opacity=".85" fontWeight="600">2,847 ft</text>
      {/* Trail (dashed) */}
      <path d="M22,152 Q48,136 78,124 Q108,112 140,116 Q170,120 196,106 Q220,92 248,78 Q275,64 302,56 Q330,48 358,40"
            fill="none" stroke="#C8A870" strokeWidth="2" strokeDasharray="5,3.5" opacity=".65"/>
      {/* GPS track */}
      <path d="M22,152 Q48,136 78,124 Q108,112 140,116 Q170,120 196,106 Q220,92 248,78"
            fill="none" stroke="#5DBE7E" strokeWidth="4" strokeLinecap="round"
            style={trackAnim ? {animation:'trackin 2s ease-out forwards', strokeDasharray:800, strokeDashoffset:800} : {}}
            opacity=".95"/>
      {/* Entry dots */}
      <circle cx="78" cy="124" r="5" fill="#2C5F3E" opacity=".9"/>
      <circle cx="140" cy="116" r="5" fill="#2C5F3E" opacity=".9"/>
      <circle cx="196" cy="106" r="5.5" fill="#B8702E" opacity=".95"/>
      {/* Start */}
      <circle cx="22" cy="152" r="5.5" fill="#2C5F3E"/>
      <circle cx="22" cy="152" r="11" fill="#2C5F3E" opacity=".18"/>
      {/* Current pos */}
      <circle cx="248" cy="78" r="7.5" fill="#5DBE7E"/>
      <circle cx="248" cy="78" r="15" fill="#5DBE7E" opacity=".22"/>
      <circle cx="248" cy="78" r="23" fill="#5DBE7E" opacity=".09"/>
      {/* Campsite pin */}
      <circle cx="140" cy="110" r="9" fill="#B8702E" opacity=".9"/>
      <text x="140" y="114" fontSize="9" fill="white" textAnchor="middle" fontFamily="system-ui">⛺</text>
      {/* Scale */}
      {!compact && <>
        <line x1="355" y1="205" x2="415" y2="205" stroke="#8A9478" strokeWidth="1.5"/>
        <line x1="355" y1="200" x2="355" y2="210" stroke="#8A9478" strokeWidth="1.5"/>
        <line x1="415" y1="200" x2="415" y2="210" stroke="#8A9478" strokeWidth="1.5"/>
        <text x="385" y="198" fontSize="8.5" fill="#8A9478" textAnchor="middle" fontFamily="system-ui">1 mi</text>
      </>}
    </svg>
  );
};

// ── Avatar strip ─────────────────────────────────────────────
const AvatarStrip = ({ names=['J','M','K'], extra=1, T }) => (
  <div style={{display:'flex', alignItems:'center'}}>
    {names.map((n,i) => (
      <div key={i} style={{
        width:28, height:28, borderRadius:14,
        background:[T.accent,'#7A5C3E','#4A6B8A'][i],
        border:'2px solid white', marginLeft:i>0?-7:0,
        display:'flex', alignItems:'center', justifyContent:'center',
        fontSize:11, fontWeight:700, color:'white', zIndex:names.length-i,
        fontFamily:F,
      }}>{n}</div>
    ))}
    {extra>0 && (
      <div style={{
        width:28, height:28, borderRadius:14, background:T.accentLight,
        border:`2px solid white`, marginLeft:-7,
        display:'flex', alignItems:'center', justifyContent:'center',
        fontSize:9, fontWeight:700, color:T.accent, fontFamily:F,
      }}>+{extra}</div>
    )}
  </div>
);

// ── Bottom Nav ────────────────────────────────────────────────
const BottomNav = ({ active='home', T, onNav, onFab }) => {
  const tabs = [
    { id:'home',  label:'Home',    d:ICONS.home,    d2:ICONS.home2 },
    { id:'map',   label:'Map',     d:ICONS.map,     d2:ICONS.map2 },
    { id:'fab',   label:'',        d:ICONS.plus,    isFab:true },
    { id:'log',   label:'Journal', d:ICONS.journal, d2:ICONS.journal2 },
    { id:'share', label:'Share',   d:ICONS.share,   d2:ICONS.share2 },
  ];
  return (
    <div style={{height:64, background:T.card, borderTop:`1px solid ${T.border}`,
                 display:'flex', alignItems:'center', paddingBottom:2, flexShrink:0}}>
      {tabs.map(t => (
        <div key={t.id} onClick={() => t.isFab ? onFab?.() : onNav?.(t.id)}
             style={{flex:1, display:'flex', flexDirection:'column', cursor:'pointer',
                     alignItems:'center', justifyContent:'center', gap:2, position:'relative'}}>
          {t.isFab ? (
            <div style={{width:50, height:50, borderRadius:25, background:T.accent,
                         display:'flex', alignItems:'center', justifyContent:'center',
                         marginTop:-24, boxShadow:`0 4px 16px ${T.accent}60`}}>
              <Ic d={t.d} size={22} color="white" sw={2.5}/>
            </div>
          ) : (
            <>
              {active===t.id && <div style={{position:'absolute', top:-1, width:26, height:3,
                background:T.accent, borderRadius:2}}/>}
              <Ic d={t.d} d2={t.d2} size={21}
                  color={active===t.id ? T.accent : T.textFaint}
                  sw={active===t.id ? 2.2 : 1.6}/>
              <span style={{fontSize:9.5, color:active===t.id ? T.accent : T.textFaint,
                             fontWeight:active===t.id?700:400, fontFamily:F, letterSpacing:.1}}>{t.label}</span>
            </>
          )}
        </div>
      ))}
    </div>
  );
};

// ════════════════════════════════════════════════════════════
// SCREEN A — NAVIGATOR  (map-first, field-use)
// ════════════════════════════════════════════════════════════
const ScreenNavigator = ({ T, onNav, onFab }) => (
  <div style={{height:'100%', background:T.bg, display:'flex', flexDirection:'column', fontFamily:F, overflow:'hidden'}}>

    {/* Full-bleed map */}
    <div style={{flex:1, position:'relative', overflow:'hidden', minHeight:0}}>
      <div style={{position:'absolute', inset:0}}>
        <MapSVG w={390} h={500} trackAnim={true}/>
      </div>

      {/* Floating top pill: trip name */}
      <div style={{position:'absolute', top:10, left:12, right:12, display:'flex', gap:8}}>
        <div style={{flex:1, background:'rgba(255,255,255,0.93)', backdropFilter:'blur(10px)',
                     borderRadius:14, padding:'9px 14px',
                     boxShadow:'0 2px 14px rgba(0,0,0,0.14)'}}>
          <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
            <div>
              <div style={{fontSize:15, fontWeight:800, color:T.text, letterSpacing:-.3}}>{T.tripName}</div>
              <div style={{fontSize:11, color:T.textSub, marginTop:1}}>Day 3 of 5 · 3 collaborators</div>
            </div>
            <div style={{display:'flex', alignItems:'center', gap:5,
                         background:T.accent, borderRadius:10, padding:'4px 9px'}}>
              <div style={{width:6, height:6, borderRadius:3, background:'#5DBE7E',
                           animation:'pulse 2s infinite'}}/>
              <span style={{fontSize:10, fontWeight:700, color:'white', letterSpacing:.8}}>LIVE</span>
            </div>
          </div>
        </div>
        <div style={{width:44, height:44, borderRadius:22, background:'rgba(255,255,255,0.93)',
                     backdropFilter:'blur(10px)', display:'flex', alignItems:'center', justifyContent:'center',
                     boxShadow:'0 2px 10px rgba(0,0,0,0.12)'}}>
          <Ic d={ICONS.compass} size={20} color={T.accent} sw={1.8}/>
        </div>
      </div>

      {/* Map attribution + layer toggle */}
      <div style={{position:'absolute', bottom:120, right:12}}>
        <div style={{display:'flex', flexDirection:'column', gap:6}}>
          {[
            {icon:'M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z M12 10a1 1 0 100 2 1 1 0 000-2z', label:''},
            {icon:'M12 22c5.52 0 10-4.48 10-10S17.52 2 12 2 2 6.48 2 12s4.48 10 10 10z', label:''},
          ].map((btn,i) => (
            <div key={i} style={{width:38, height:38, borderRadius:10, background:'rgba(255,255,255,0.93)',
                                  backdropFilter:'blur(8px)', display:'flex', alignItems:'center', justifyContent:'center',
                                  boxShadow:'0 1px 8px rgba(0,0,0,0.1)'}}>
              <Ic d={btn.icon} size={17} color={T.textSub} sw={1.6}/>
            </div>
          ))}
        </div>
      </div>

      {/* Stats pill row over map bottom */}
      <div style={{position:'absolute', bottom:14, left:12, right:12}}>
        <div style={{background:'rgba(255,255,255,0.95)', backdropFilter:'blur(10px)',
                     borderRadius:16, padding:'12px 6px', boxShadow:'0 4px 22px rgba(0,0,0,0.16)',
                     display:'flex'}}>
          {[
            {val:'12.4', unit:'mi', label:'Distance'},
            {val:'2,847', unit:'ft', label:'Elevation'},
            {val:'4h 32m', unit:'', label:'Moving'},
            {val:'68°', unit:'F', label:'Temp'},
          ].map((s,i,arr) => (
            <div key={i} style={{flex:1, textAlign:'center',
                                  borderRight: i<arr.length-1 ? `1px solid ${T.border}` : 'none'}}>
              <div style={{fontSize:16, fontWeight:800, color:T.text, letterSpacing:-.5, lineHeight:1}}>
                {s.val}<span style={{fontSize:10, fontWeight:500, color:T.textSub}}>{s.unit}</span>
              </div>
              <div style={{fontSize:9.5, color:T.textFaint, marginTop:3, fontWeight:500}}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>
    </div>

    {/* Bottom drawer: entries */}
    <div style={{background:T.card, borderRadius:'20px 20px 0 0', padding:'6px 16px 0',
                 boxShadow:'0 -2px 20px rgba(0,0,0,0.08)', flexShrink:0}}>
      <div style={{width:36, height:4, background:T.border, borderRadius:2, margin:'0 auto 12px'}}/>
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}}>
        <span style={{fontSize:13, fontWeight:700, color:T.text}}>Today's Entries · 3</span>
        <span style={{fontSize:12, color:T.accent, fontWeight:700}}>View all</span>
      </div>
      <div style={{display:'flex', gap:10, paddingBottom:16, overflowX:'auto'}}>
        {[
          {type:'Photos', icon:ICONS.camera, label:'18 photos', sub:'Big Sur coast', time:'2h ago', col:T.amber},
          {type:'Campsite', icon:ICONS.tent, label:'Shelter Cove', sub:'★★★★  Exposed', time:'5h ago', col:T.accent},
          {type:'Wildlife', icon:ICONS.leaf, label:'Roosevelt Elk', sub:'12 spotted', time:'7h ago', col:'#4A7A34'},
        ].map((e,i) => (
          <div key={i} style={{flexShrink:0, width:118, background:T.bg, borderRadius:12, padding:'10px',
                                border:`1px solid ${T.border}`}}>
            <div style={{width:34, height:34, borderRadius:8, background:e.col+'22',
                         display:'flex', alignItems:'center', justifyContent:'center', marginBottom:8}}>
              <Ic d={e.icon} size={16} color={e.col} sw={1.8}/>
            </div>
            <div style={{fontSize:11.5, fontWeight:700, color:T.text, lineHeight:1.2}}>{e.label}</div>
            <div style={{fontSize:10, color:T.textSub, marginTop:2, lineHeight:1.3}}>{e.sub}</div>
            <div style={{fontSize:10, color:T.textFaint, marginTop:4}}>{e.time}</div>
          </div>
        ))}
      </div>
    </div>
    <BottomNav active="map" T={T} onNav={onNav} onFab={onFab}/>
  </div>
);

// ════════════════════════════════════════════════════════════
// SCREEN B — FIELD JOURNAL  (card dashboard, camp-use)
// ════════════════════════════════════════════════════════════
const CAPTURE_MODES = {
  camping: [
    {icon:ICONS.mic,   label:'Voice',   col:'#5B8DD9'},
    {icon:ICONS.video, label:'Video',   col:'#C05050'},
    {icon:ICONS.note,  label:'Note',    col:'#6B6763'},
    {icon:ICONS.tent,  label:'Camp',    col:'#B8702E'},
    {icon:ICONS.drop,  label:'Water',   col:'#4A8BC4'},
    {icon:ICONS.fork,  label:'Food',    col:'#B06030'},
    {icon:ICONS.leaf,  label:'Wild',    col:'#4A7A34'},
  ],
  river: [
    {icon:ICONS.mic,   label:'Voice',   col:'#5B8DD9'},
    {icon:ICONS.video, label:'Video',   col:'#C05050'},
    {icon:ICONS.drop,  label:'Rapid',   col:'#3A72A8'},
    {icon:'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z',
                        label:'Gauge',   col:'#2A5C8E'},
    {icon:ICONS.tent,  label:'Camp',    col:'#B8702E'},
    {icon:ICONS.leaf,  label:'Wild',    col:'#4A7A34'},
    {icon:ICONS.note,  label:'Note',    col:'#6B6763'},
  ],
};

const ScreenFieldJournal = ({ T, onNav, onFab }) => {
  const [captureMode, setCaptureMode] = React.useState('camping');
  const captureItems = CAPTURE_MODES[captureMode];
  return (
  <div style={{height:'100%', background:T.bg, display:'flex', flexDirection:'column', fontFamily:F, overflow:'hidden'}}>

    {/* Header */}
    <div style={{background:T.card, padding:'10px 16px 14px',
                 borderBottom:`1px solid ${T.border}`, flexShrink:0}}>
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:19, fontWeight:800, color:T.text, letterSpacing:-.5}}>{T.tripName}</div>
          <div style={{fontSize:11, color:T.textSub, marginTop:2}}>Apr 19 – 24 · Day 3 of 5</div>
        </div>
        <AvatarStrip T={T}/>
      </div>
    </div>

    <div style={{flex:1, overflowY:'auto', padding:'12px 16px'}}>

      {/* Map card */}
      <div style={{borderRadius:14, overflow:'hidden', marginBottom:12,
                   boxShadow:'0 2px 14px rgba(0,0,0,0.09)', height:134, position:'relative'}}>
        <MapSVG w={358} h={134} compact={true}/>
        <div style={{position:'absolute', top:8, left:10, background:'rgba(255,255,255,0.9)',
                     borderRadius:8, padding:'3px 9px', fontSize:10.5, fontWeight:700, color:T.accent}}>
          Topo · 5-day route
        </div>
        <div style={{position:'absolute', top:8, right:10, background:T.accent,
                     borderRadius:8, padding:'3px 9px', fontSize:10, fontWeight:700, color:'white'}}>
          Expand
        </div>
      </div>

      {/* Stats grid */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:8, marginBottom:14}}>
        {[
          {val:'12.4', label:'Miles', sub:'today', icon:'M17 8C8 10 5.9 16.17 3.82 19h3.45C9 17 12 14 17 8z M21 3L3 21'},
          {val:'2,847', label:'Feet', sub:'gain', icon:'M22 17.5l-10-15-10 15'},
          {val:'★ 4.2', label:'Site', sub:'avg', icon:ICONS.tent},
          {val:'68°F', label:'Temp', sub:'now', icon:ICONS.drop},
        ].map((s,i) => (

const ScreenTripReplay = ({ T }) => {
  const [legIdx, setLegIdx]             = React.useState(0);
  const [phase, setPhase]               = React.useState('ready');   // ready|playing|done
  const [shownEntries, setShownEntries] = React.useState(new Set());
  const [personFilter, setPersonFilter] = React.useState('All');
  const timers = React.useRef([]);

  const leg = REPLAY_LEGS[legIdx];

  const clearTimers = () => { timers.current.forEach(clearTimeout); timers.current = []; };

  const startPlay = () => {
    clearTimers();
    setShownEntries(new Set());
    setPhase('playing');
    const entries = personFilter === 'All'
      ? leg.entries
      : leg.entries.filter(e => e.person === personFilter);
    entries.forEach((_, i) => {
      timers.current.push(setTimeout(() =>
        setShownEntries(prev => new Set([...prev, leg.entries.indexOf(entries[i])])),
        900 + i * 750
      ));
    });
    timers.current.push(setTimeout(() => setPhase('done'), 900 + entries.length * 750 + 500));
  };

  const goNext = () => {
    if (legIdx < REPLAY_LEGS.length - 1) {
      clearTimers();
      setLegIdx(l => l + 1);
      setPhase('ready');
      setShownEntries(new Set());
    }
  };

  const goPrev = () => {
    if (legIdx > 0) {
      clearTimers();
      const prev = REPLAY_LEGS[legIdx - 1];
      setLegIdx(l => l - 1);
      setPhase('done');
      setShownEntries(new Set(prev.entries.map((_,i) => i)));
    }
  };

  const jumpTo = (i) => {
    clearTimers();
    if (i < legIdx) {
      setLegIdx(i);
      setPhase('done');
      setShownEntries(new Set(REPLAY_LEGS[i].entries.map((_,j) => j)));
    } else if (i > legIdx) {
      setLegIdx(i);
      setPhase('ready');
      setShownEntries(new Set());
    }
  };

  React.useEffect(() => () => clearTimers(), []);

  const allPeople = ['All', ...new Set(REPLAY_LEGS.flatMap(l => l.entries.map(e => e.person)))];
  const visibleLegEntries = personFilter === 'All'
    ? leg.entries
    : leg.entries.filter(e => e.person === personFilter);
  const isLast = legIdx === REPLAY_LEGS.length - 1;

  return (
    <div style={{height:'100%', background:'#0F1A14', display:'flex', flexDirection:'column', fontFamily:F, overflow:'hidden'}}>

      {/* Top bar */}
      <div style={{padding:'10px 14px 8px', flexShrink:0}}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10}}>
          <div style={{display:'flex', alignItems:'center', gap:8}}>
            <Ic d="M19 12H5 M12 5l-7 7 7 7" size={18} color="rgba(255,255,255,.6)" sw={2}/>
            <div>
              <div style={{fontSize:14, fontWeight:800, color:'white', letterSpacing:-.3}}>Lost Coast Trail</div>
              <div style={{fontSize:10, color:'rgba(255,255,255,.45)'}}>Apr 19–23 · 42.3 mi · 5 days</div>
            </div>
          </div>
          <div style={{display:'flex', gap:6}}>
            <div style={{background:'rgba(93,190,126,0.2)', borderRadius:8, padding:'5px 10px',
                         border:'1px solid rgba(93,190,126,0.35)', fontSize:11, fontWeight:700, color:'#5DBE7E'}}>
              Share
            </div>
          </div>
        </div>

        {/* Day progress dots */}
        <div style={{display:'flex', gap:6, alignItems:'center', marginBottom:8}}>
          {REPLAY_LEGS.map((lg, i) => (
            <div key={i} onClick={() => jumpTo(i)}
                 style={{cursor:'pointer', display:'flex', alignItems:'center', flex: i===legIdx ? 3 : 1,
                         transition:'flex .3s ease'}}>
              <div style={{height:3, width:'100%', borderRadius:2,
                           background: i < legIdx ? '#5DBE7E'
                                      : i === legIdx ? '#5DBE7E'
                                      : 'rgba(255,255,255,0.15)',
                           opacity: i < legIdx ? .55 : 1}}>
                {i === legIdx && phase === 'playing' && (
                  <div style={{height:'100%', background:'#5DBE7E', borderRadius:2,
                               animation:'trackFill 2s linear forwards'}}/>
                )}
              </div>
            </div>
          ))}
          <span style={{fontSize:10, color:'rgba(255,255,255,.4)', marginLeft:4, whiteSpace:'nowrap'}}>
            {legIdx+1} / {REPLAY_LEGS.length}
          </span>
        </div>

        {/* Person filter pills */}
        <div style={{display:'flex', gap:6, overflowX:'auto'}}>
          {allPeople.map(p => (
            <div key={p} onClick={() => setPersonFilter(p)}
                 style={{flexShrink:0, padding:'4px 10px', borderRadius:14, fontSize:10.5, fontWeight:700,
                         background: personFilter===p ? '#5DBE7E' : 'rgba(255,255,255,.08)',
                         color: personFilter===p ? '#0F1A14' : 'rgba(255,255,255,.55)',
                         cursor:'pointer', transition:'all .15s'}}>
              {p}
            </div>
          ))}
        </div>
      </div>

      {/* Map hero */}
      <div style={{flex:'0 0 230px', position:'relative', overflow:'hidden'}}>
        <ReplayMap legIdx={legIdx} phase={phase} shownEntries={shownEntries}/>

        {/* Day label overlay */}
        <div style={{position:'absolute', top:10, right:10, background:'rgba(15,26,20,0.8)',
                     backdropFilter:'blur(6px)', borderRadius:10, padding:'6px 10px'}}>
          <div style={{fontSize:10, fontWeight:700, color:'rgba(255,255,255,.5)', letterSpacing:.7}}>{leg.date.toUpperCase()}</div>
          <div style={{fontSize:13, fontWeight:800, color:'white', letterSpacing:-.2}}>{leg.label}</div>
        </div>

        {/* Playing indicator */}
        {phase === 'playing' && (
          <div style={{position:'absolute', bottom:10, left:'50%', transform:'translateX(-50%)',
                       background:'rgba(15,26,20,0.85)', backdropFilter:'blur(6px)',
                       borderRadius:20, padding:'5px 14px',
                       display:'flex', alignItems:'center', gap:7}}>
            <div style={{display:'flex', gap:3}}>
              {[0,1,2].map(i => (
                <div key={i} style={{width:4, height:4, borderRadius:2, background:'#5DBE7E',
                                     animation:`pulse 1.2s ${i*0.2}s infinite`}}/>
              ))}
            </div>
            <span style={{fontSize:11, fontWeight:600, color:'rgba(255,255,255,.8)'}}>Recording route…</span>
          </div>
        )}
      </div>

      {/* Bottom panel */}
      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minHeight:0}}>

        {/* Leg header */}
        <div style={{padding:'12px 14px 10px', borderBottom:'1px solid rgba(255,255,255,0.07)', flexShrink:0}}>
          <div style={{fontSize:15, fontWeight:800, color:'white', letterSpacing:-.3, marginBottom:4,
                       opacity: phase==='ready' ? .6 : 1, transition:'opacity .3s'}}>{leg.title}</div>
          <div style={{display:'flex', gap:14}}>
            {[{v:leg.miles,l:'miles'},{v:leg.elev,l:'elev'},{v:leg.weather,l:''}].map((s,i) => (
              <div key={i}>
                <span style={{fontSize:12, fontWeight:800, color: i===0 ? '#5DBE7E' : 'rgba(255,255,255,.75)',
                              letterSpacing:-.2}}>{s.v}</span>
                {s.l && <span style={{fontSize:10, color:'rgba(255,255,255,.35)', marginLeft:3}}>{s.l}</span>}
              </div>
            ))}
          </div>
        </div>

        {/* Entry cards — scroll horizontally */}
        <div style={{flex:1, overflowY:'auto', padding:'10px 14px', minHeight:0}}>
          {phase === 'ready' && (
            <div style={{height:'100%', display:'flex', alignItems:'center', justifyContent:'center'}}>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:12, color:'rgba(255,255,255,.35)', marginBottom:16}}>
                  {visibleLegEntries.length} entries on this leg
                </div>
                <div style={{display:'flex', alignItems:'center', gap:8}}>
                  {leg.entries.map((e,i) => (
                    <div key={i} style={{width:10, height:10, borderRadius:5, background:e.col, opacity:.5}}/>
                  ))}
                </div>
              </div>
            </div>
          )}
          {(phase === 'playing' || phase === 'done') && (
            <div style={{display:'flex', flexDirection:'column', gap:8}}>
              {leg.entries.map((e,i) => {
                const visible = shownEntries.has(i);
                const filtered = personFilter !== 'All' && e.person !== personFilter;
                return (
                  <div key={i} style={{

                    opacity: visible && !filtered ? 1 : filtered ? .25 : 0,
                    transform: visible ? 'translateY(0)' : 'translateY(12px)',
                    transition:'opacity .4s ease, transform .4s ease',
                  }}>
                    <div style={{width:34, height:34, borderRadius:9, background:e.col+'30',
                                 border:`1.5px solid ${e.col}50`,
                                 display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
                      <Ic d={
                        e.type==='Campsite' ? ICONS.tent :
                        e.type==='Wildlife' ? ICONS.leaf :
                        e.type==='Water'    ? ICONS.drop :
                        e.type==='Start' || e.type==='Finish' ? "M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z M12 10a1 1 0 100 2 1 1 0 000-2z" :
                        ICONS.note
                      } size={15} color={e.col} sw={1.9}/>
                    </div>
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{display:'flex', alignItems:'baseline', justifyContent:'space-between', gap:6}}>
                        <span style={{fontSize:12.5, fontWeight:800, color:'white', letterSpacing:-.2}}>{e.title}</span>
                        <span style={{fontSize:9.5, color:'rgba(255,255,255,.3)', flexShrink:0}}>{e.person}</span>
                      </div>
                      <div style={{fontSize:11, color:'rgba(255,255,255,.5)', marginTop:2, lineHeight:1.4}}>{e.sub}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Navigation controls */}
        <div style={{padding:'10px 14px 14px', borderTop:'1px solid rgba(255,255,255,0.07)', flexShrink:0}}>
          {phase === 'ready' && (
            <div style={{display:'flex', gap:8}}>
              {legIdx > 0 && (
                <div onClick={goPrev}
                     style={{width:48, height:48, borderRadius:14, background:'rgba(255,255,255,.08)',
                             border:'1px solid rgba(255,255,255,.1)',
                             display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer'}}>
                  <Ic d="M19 12H5 M12 5l-7 7 7 7" size={18} color="rgba(255,255,255,.6)" sw={2}/>
                </div>
              )}
              <div onClick={startPlay}
                   style={{flex:1, height:48, borderRadius:14, background:'#5DBE7E',
                           display:'flex', alignItems:'center', justifyContent:'center', gap:8,
                           cursor:'pointer', boxShadow:'0 4px 18px rgba(93,190,126,0.35)'}}>
                <Ic d="M5 3l14 9-14 9V3z" size={18} color="#0F1A14" sw={2} fill="#0F1A14"/>
                <span style={{fontSize:14, fontWeight:800, color:'#0F1A14'}}>Play {leg.label}</span>
              </div>
            </div>
          )}

          {phase === 'playing' && (
            <div style={{height:48, borderRadius:14, background:'rgba(93,190,126,0.12)',

              <div style={{display:'flex', gap:4}}>
                {[0,1,2].map(i => (
                  <div key={i} style={{width:5, height:5, borderRadius:3, background:'#5DBE7E',
                                       animation:`pulse 1.4s ${i*0.18}s infinite`}}/>
                ))}
              </div>
              <span style={{fontSize:13, fontWeight:700, color:'#5DBE7E'}}>Route recording…</span>
            </div>
          )}

          {phase === 'done' && (
            <div style={{display:'flex', gap:8}}>
              {legIdx > 0 && (
                <div onClick={goPrev}
                     style={{width:48, height:48, borderRadius:14, background:'rgba(255,255,255,.08)',
                             border:'1px solid rgba(255,255,255,.1)',
                             display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer'}}>
                  <Ic d="M19 12H5 M12 5l-7 7 7 7" size={18} color="rgba(255,255,255,.6)" sw={2}/>
                </div>
              )}
              {!isLast ? (
                <div onClick={goNext}
                     style={{flex:1, height:48, borderRadius:14, background:'#5DBE7E',
                             display:'flex', alignItems:'center', justifyContent:'center', gap:6,
                             cursor:'pointer', boxShadow:'0 4px 18px rgba(93,190,126,0.35)'}}>
                  <span style={{fontSize:14, fontWeight:800, color:'#0F1A14'}}>
                    Next: {REPLAY_LEGS[legIdx+1].label}
                  </span>
                  <Ic d="M5 12h14 M12 5l7 7-7 7" size={16} color="#0F1A14" sw={2.2}/>
                </div>
              ) : (
                <div style={{flex:1, height:48, borderRadius:14,
                             background:'linear-gradient(135deg, #2C5F3E, #5DBE7E)',
                             display:'flex', alignItems:'center', justifyContent:'center', gap:6,
                             boxShadow:'0 4px 18px rgba(93,190,126,0.4)'}}>
                  <span style={{fontSize:14, fontWeight:800, color:'white'}}>Trip Complete · 42.3 mi 🎉</span>
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// USGS flow sparkline SVG
const FlowChart = ({ w, h }) => {
  // Simulated 8-day CFS values — dip then rise toward trip
  const vals = [980, 1050, 1180, 1090, 1020, 1150, 1240, 1310];
  const min = 800, max = 1600;
  const pts = vals.map((v, i) => {
    const x = 12 + (i / (vals.length - 1)) * (w - 24);
    const y = h - 10 - ((v - min) / (max - min)) * (h - 20);
    return [x, y];
  });
  const line = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0]},${p[1]}`).join(' ');
  const area = line + ` L${pts[pts.length-1][0]},${h} L${pts[0][0]},${h} Z`;
  // Optimal range band: 900–1400 CFS
  const optY1 = h - 10 - ((1400 - min) / (max - min)) * (h - 20);
  const optY2 = h - 10 - ((900 - min) / (max - min)) * (h - 20);
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun','Mon'];
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      {/* Optimal band */}
      <rect x={12} y={optY1} width={w-24} height={optY2-optY1} fill="#5DBE7E" opacity=".12"/>
      <line x1={12} y1={optY1} x2={w-12} y2={optY1} stroke="#5DBE7E" strokeWidth=".8" strokeDasharray="3,2" opacity=".5"/>
      <line x1={12} y1={optY2} x2={w-12} y2={optY2} stroke="#5DBE7E" strokeWidth=".8" strokeDasharray="3,2" opacity=".4"/>
      {/* Area fill */}
      <path d={area} fill="#3A72A8" opacity=".1"/>
      {/* Line */}
      <path d={line} fill="none" stroke="#3A72A8" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
      {/* Current dot */}
      <circle cx={pts[pts.length-2][0]} cy={pts[pts.length-2][1]} r="4.5" fill="#3A72A8"/>
      <circle cx={pts[pts.length-2][0]} cy={pts[pts.length-2][1]} r="8" fill="#3A72A8" opacity=".2"/>
      {/* Day labels */}
      {days.map((d, i) => {
        const x = 12 + (i / (vals.length - 1)) * (w - 24);
        return <text key={i} x={x} y={h-1} fontSize="8" fill="#A09D99" textAnchor="middle" fontFamily="system-ui">{d}</text>;
      })}
      {/* Labels on band */}
      <text x={w-10} y={optY1-3} fontSize="7.5" fill="#5DBE7E" textAnchor="end" fontFamily="system-ui" fontWeight="600">MAX OPTIMAL</text>
      <text x={w-10} y={optY2+9} fontSize="7.5" fill="#5DBE7E" textAnchor="end" fontFamily="system-ui" fontWeight="600">MIN OPTIMAL</text>
    </svg>
  );
};

        <div style={{background:T.card, borderRadius:14, padding:'14px', marginBottom:14,
                     border:`1px solid ${T.border}`}}>
          <div style={{fontSize:13, fontWeight:700, color:T.text, marginBottom:12}}>Pre-flight</div>
          {[
            {label:'GPS location', status:'Ready', ok:true},
            {label:'Offline maps', status:'Tap to download · 42 MB', ok:false, action:true},
            {label:'Camera access', status:'Allowed', ok:true},
            {label:'Microphone', status:'Allowed', ok:true},
          ].map((item,i) => (
            <div key={i} style={{display:'flex', alignItems:'center', gap:10, paddingBottom:10,
                                  borderBottom: i<3 ? `1px solid ${T.border}` : 'none',
                                  marginBottom: i<3 ? 10 : 0}}>
              <div style={{width:28, height:28, borderRadius:14,
                           background: item.ok ? T.accentLight : T.amberLight,
                           display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
                <Ic d={item.ok
                  ? "M20 6L9 17l-5-5"
                  : "M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"}
                    size={14} color={item.ok ? T.accent : T.amber} sw={2.2}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:12.5, fontWeight:600, color:T.text}}>{item.label}</div>
                <div style={{fontSize:11, color: item.ok ? T.textFaint : T.amber,
                             fontWeight: item.ok ? 400 : 600}}>{item.status}</div>
              </div>
              {item.action && (
                <div style={{background:T.amber, borderRadius:8, padding:'4px 10px',
                             fontSize:11, fontWeight:700, color:'white'}}>Download</div>
              )}
            </div>
          ))}
        </div>

        {/* Visibility reminder */}
        <div style={{display:'flex', gap:10, padding:'12px 14px', background:T.accentLight,
                     borderRadius:12, marginBottom:8, alignItems:'flex-start'}}>
          <Ic d={ICONS.users} size={16} color={T.accent} sw={1.8}/>
          <div style={{fontSize:12, color:T.accentMid, lineHeight:1.45}}>
            <span style={{fontWeight:700, color:T.accent}}>Followers </span>
            can see this trip and replay it after you start.
          </div>
        </div>
      </div>

      {/* Launch CTA */}
      <div style={{padding:'12px 16px 16px', background:T.card,
                   borderTop:`1px solid ${T.border}`, flexShrink:0}}>
        <div onClick={() => onLaunch?.()} style={{background:T.accent, borderRadius:14, padding:'16px', textAlign:'center',
                     display:'flex', alignItems:'center', justifyContent:'center', gap:10,
                     boxShadow:`0 6px 22px ${T.accent}55`, cursor:'pointer'}}>
          <div style={{width:10, height:10, borderRadius:5, background:'#5DBE7E',
                       animation:'pulse 2s infinite'}}/>
          <span style={{fontSize:16, fontWeight:800, color:'white', letterSpacing:-.3}}>
            Start Recording Trip
          </span>
        </div>
        <div style={{textAlign:'center', fontSize:11, color:T.textFaint, marginTop:8}}>
          GPS tracking begins immediately
        </div>
      </div>
    </div>
  );
};

// ════════════════════════════════════════════════════════════
// TRIP APP — wired interactive prototype
// nav: home | map | log | share | new-trip | new-invite | new-launch
// ════════════════════════════════════════════════════════════
const TripApp = ({ T }) => {
  const [screen, setScreen] = React.useState('home');

  const onNav = (tab) => {
    if (tab === 'home')  setScreen('home');
    if (tab === 'map')   setScreen('map');
    if (tab === 'log')   setScreen('log');
    if (tab === 'share') setScreen('share');
  };
  const onFab = () => setScreen('new-trip');

  const navTab = screen === 'map' ? 'map'
               : screen === 'log' ? 'log'
               : screen === 'share' ? 'share'
               : screen.startsWith('new') ? 'home'
               : 'home';

  const commonProps = { T, onNav, onFab };

  if (screen === 'home')        return <ScreenHomeHub {...commonProps} onReturnToTrip={() => setScreen('log')}/>;
  if (screen === 'map')         return <ScreenNavigator {...commonProps}/>;
  if (screen === 'log')         return <ScreenFieldJournal {...commonProps}/>;
  if (screen === 'share')       return <ScreenTripReplay T={T}/>;
  if (screen === 'new-trip')    return <ScreenNewTrip T={T} onNext={() => setScreen('new-invite')} onBack={() => setScreen('home')}/>;
  if (screen === 'new-invite')  return <ScreenInvite T={T} onNext={() => setScreen('new-launch')} onBack={() => setScreen('new-trip')}/>;
  if (screen === 'new-launch')  return <ScreenReadyToLaunch T={T} onLaunch={() => setScreen('map')} onBack={() => setScreen('new-invite')}/>;
  return null;
};

// ════════════════════════════════════════════════════════════
// ROOT APP
// ════════════════════════════════════════════════════════════
function App() {
  const [T, setT] = React.useState(TWEAK_DEFAULTS);
  const [tweakOpen, setTweakOpen] = React.useState(false);

  React.useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweakOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakOpen(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const updateToken = (key, val) => {
    setT(prev => ({...prev, [key]: val}));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  return (
    <>
      <DesignCanvas>
        <DCSection id="prototype" title="★ Interactive Prototype"
          subtitle="Fully wired · Bottom nav · FAB → New Trip flow · Return to trip">

          <DCArtboard id="interactive" label="Live prototype — tap to navigate" width={390} height={780}>
            <AndroidDevice width={390} height={780}>
              <TripApp T={T}/>
            </AndroidDevice>
          </DCArtboard>

        </DCSection>

        <DCSection id="replay" title="Trip Replay Viewer"
          subtitle="Animated slideshow · tap Play per leg · entries appear as track draws">

          <DCArtboard id="replay-viewer" label="Interactive · Lost Coast Trail" width={390} height={780}>
            <AndroidDevice width={390} height={780}>
              <ScreenTripReplay T={T}/>
            </AndroidDevice>
          </DCArtboard>

        </DCSection>

        <DCSection id="home-screen" title="Home Screen — App Entry"
          subtitle="3 directions for the hub / splash screen">

          <DCArtboard id="smart-hub" label="A · Smart Hub  (contextual)" width={390} height={780}>
            <AndroidDevice width={390} height={780}>
              <ScreenHomeHub T={T}/>
            </AndroidDevice>
          </DCArtboard>

          <DCArtboard id="adventure-menu" label="B · Adventure Menu  (bold tiles)" width={390} height={780}>
            <AndroidDevice width={390} height={780}>
              <ScreenAdventureMenu T={T}/>
            </AndroidDevice>
          </DCArtboard>

          <DCArtboard id="quick-list" label="C · Quick List  (minimal, fast)" width={390} height={780}>
            <AndroidDevice width={390} height={780}>
              <ScreenQuickList T={T}/>
            </AndroidDevice>
          </DCArtboard>

        </DCSection>

        <DCSection id="dashboard" title="TripReport — Home Dashboard"
          subtitle="3 directions · Click label to focus · Drag grip to reorder">

          <DCArtboard id="navigator" label="A · Navigator  (map-first, in-field)" width={390} height={780}>
            <AndroidDevice width={390} height={780}>
              <ScreenNavigator T={T}/>
            </AndroidDevice>
          </DCArtboard>

          <DCArtboard id="journal" label="B · Field Journal  (dashboard, at-camp)" width={390} height={780}>
            <AndroidDevice width={390} height={780}>
              <ScreenFieldJournal T={T}/>
            </AndroidDevice>
          </DCArtboard>

          <DCArtboard id="storyteller" label="C · Storyteller  (feed, share-oriented)" width={390} height={780}>
            <AndroidDevice width={390} height={780}>
              <ScreenStoryteller T={T}/>
            </AndroidDevice>
          </DCArtboard>

        </DCSection>

        <DCSection id="river" title="Rafting Mode — Salt River, AZ"
          subtitle="River intel · On-water logging · Retroactive GPS placement">

          <DCArtboard id="river-intel" label="1 · River Intel & Offline" width={390} height={780}>
            <AndroidDevice width={390} height={780}>
              <ScreenRiverIntel T={T}/>
            </AndroidDevice>
          </DCArtboard>

          <DCArtboard id="rapid-logger" label="2 · On-Water Logger" width={390} height={780}>
            <AndroidDevice width={390} height={780}>
              <ScreenRapidLogger T={T}/>
            </AndroidDevice>
          </DCArtboard>

          <DCArtboard id="map-tag" label="3 · Map Tag Review (at camp)" width={390} height={780}>
            <AndroidDevice width={390} height={780}>
              <ScreenMapTag T={T}/>
            </AndroidDevice>
          </DCArtboard>

        </DCSection>

        <DCSection id="new-trip" title="New Trip Flow"
          subtitle="Setup → Invite → Launch · 3-screen sequence">

          <DCArtboard id="setup" label="1 · Trip Setup" width={390} height={780}>
            <AndroidDevice width={390} height={780}>
              <ScreenNewTrip T={T}/>
            </AndroidDevice>
          </DCArtboard>

          <DCArtboard id="invite" label="2 · Invite & Permissions" width={390} height={780}>
            <AndroidDevice width={390} height={780}>
              <ScreenInvite T={T}/>
            </AndroidDevice>
          </DCArtboard>

          <DCArtboard id="launch" label="3 · Ready to Launch" width={390} height={780}>
            <AndroidDevice width={390} height={780}>
              <ScreenReadyToLaunch T={T}/>
            </AndroidDevice>
          </DCArtboard>

        </DCSection>
      </DesignCanvas>

      {/* Tweaks Panel */}
      {tweakOpen && (
        <div style={{position:'fixed', bottom:24, right:24, zIndex:9999,
                     background:'white', borderRadius:16, padding:'18px',
                     boxShadow:'0 8px 40px rgba(0,0,0,0.2)', width:250, fontFamily:F}}>
          <div style={{fontSize:14, fontWeight:800, color:T.text, marginBottom:14}}>Tweaks</div>

          <div style={{fontSize:11, fontWeight:700, color:T.textSub, marginBottom:8,
                       textTransform:'uppercase', letterSpacing:.7}}>Accent Color</div>
          <div style={{display:'flex', gap:8, marginBottom:16}}>
            {[
              {c:'#2C5F3E', cl:'#EBF3ED', cm:'#4A8B61', l:'Forest'},
              {c:'#3A72A8', cl:'#E4EFF8', cm:'#5A8EC8', l:'Ocean'},
              {c:'#7A3A22', cl:'#FBF0E4', cm:'#A05030', l:'Canyon'},
              {c:'#1A1917', cl:'#F0EEEB', cm:'#4A4840', l:'Obsidian'},
            ].map(opt => (
              <div key={opt.c} onClick={() => {
                updateToken('accent', opt.c);
                updateToken('accentLight', opt.cl);
                updateToken('accentMid', opt.cm);
              }} style={{display:'flex', flexDirection:'column', alignItems:'center', gap:4, cursor:'pointer'}}>
                <div style={{width:32, height:32, borderRadius:16, background:opt.c,
                             border: T.accent===opt.c ? '3px solid #333' : '3px solid transparent'}}/>
                <span style={{fontSize:9, color:T.textSub, fontWeight:500}}>{opt.l}</span>
              </div>
            ))}
          </div>

          <div style={{fontSize:11, fontWeight:700, color:T.textSub, marginBottom:8,
                       textTransform:'uppercase', letterSpacing:.7}}>Trip Name</div>
          <input value={T.tripName} onChange={e => updateToken('tripName', e.target.value)}
            style={{width:'100%', border:`1px solid ${T.border}`, borderRadius:8, padding:'7px 10px',
                    fontSize:12, fontFamily:F, color:T.text, outline:'none', marginBottom:14}}/>

          <div style={{fontSize:11, fontWeight:700, color:T.textSub, marginBottom:8,
                       textTransform:'uppercase', letterSpacing:.7}}>Background Tone</div>
          <div style={{display:'flex', gap:8}}>
            {[{c:'#F5F4F0',l:'Warm'},{c:'#F0F4F5',l:'Cool'},{c:'#FFFFFF',l:'White'}].map(opt => (
              <div key={opt.c} onClick={() => updateToken('bg', opt.c)}
                   style={{flex:1, padding:'7px 0', borderRadius:8, background:opt.c,
                            border: T.bg===opt.c ? `2px solid ${T.accent}` : `1px solid ${T.border}`,
                            textAlign:'center', cursor:'pointer',
                            fontSize:10, fontWeight:600, color:T.textSub}}>{opt.l}</div>
            ))}
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
